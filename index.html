<!-- Update-available toast (hidden until a new SW takes control) -->
<div id="update-toast" class="update-toast" role="status" hidden>
  <button type="button" id="update-toast-btn" class="update-toast__btn">
    新しいバージョンがあります — タップで更新
  </button>
</div>

<!-- iOS "add to home screen" install hint (shown once, dismissible) -->
<div id="ios-install-banner" class="ios-install-banner" role="status" hidden>
  <span class="ios-install-banner__text">共有 → ホーム画面に追加 でインストール</span>
  <button type="button" id="ios-install-dismiss" class="ios-install-banner__dismiss" aria-label="閉じる">✕</button>
</div>

<script type="module" src="./js/app.js"></script>
<script>
  // Service worker registration + update flow. Kept as a plain inline
  // script (not a module) so it runs independently of app.js and can never
  // block app boot if something in the SW path throws.
  if ("serviceWorker" in navigator) {
    // A page loaded with no controller yet (first-ever visit, or a hard
    // reload that bypassed the SW) will still fire one "controllerchange"
    // event the moment the new worker calls clients.claim() during its very
    // first activation. That first claim is not an update — it's just the
    // SW turning on — so it must not trigger the update toast. Only treat
    // controllerchange as "an update is available" when this page was
    // already under an active controller when it loaded.
    const hadControllerOnLoad = !!navigator.serviceWorker.controller;

    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch(() => {
        // Offline-first app still works without a SW; ignore registration
        // failures (e.g. unsupported browser, privacy mode restrictions).
      });
    });

    let reloadedOnce = false;
    let firstControllerChangeSeen = false;
    navigator.serviceWorker.addEventListener("controllerchange", () => {
      if (reloadedOnce) return;

      const isFirstClaim = !firstControllerChangeSeen && !hadControllerOnLoad;
      firstControllerChangeSeen = true;
      if (isFirstClaim) return;

      // Never yank the exam runner out from under an in-progress exam:
      // the timer is wall-clock based and a reload would lose the in-memory
      // runner state before the user finishes.
      let examInProgress = false;
      try {
        examInProgress = localStorage.getItem("ccaf.v1.exam.active") != null;
      } catch (err) {
        examInProgress = false;
      }
      if (examInProgress) return;

      const toast = document.getElementById("update-toast");
      const btn = document.getElementById("update-toast-btn");
      if (!toast || !btn) return;
      toast.hidden = false;
      btn.addEventListener(
        "click",
        () => {
          reloadedOnce = true;
          window.location.reload();
        },
        { once: true }
      );
    });
  }

  // iOS Safari "add to home screen" hint: only for iOS Safari, only when
  // not already launched as a standalone PWA, and only once ever.
  (function iosInstallBanner() {
    const IOS_BANNER_KEY = "ccaf.v1.ui.iosBannerDismissed";
    const ua = navigator.userAgent || "";
    const isIOS = /iP(hone|ad|od)/.test(ua) || (ua.includes("Macintosh") && "ontouchend" in document);
    const isSafari = /Safari/.test(ua) && !/CriOS|FxiOS|EdgiOS|OPiOS/.test(ua);
    const isStandalone =
      window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;

    if (!isIOS || !isSafari || isStandalone) return;

    let dismissed = false;
    try {
      dismissed = localStorage.getItem(IOS_BANNER_KEY) === "1";
    } catch (err) {
      dismissed = false;
    }
    if (dismissed) return;

    const banner = document.getElementById("ios-install-banner");
    const dismissBtn = document.getElementById("ios-install-dismiss");
    if (!banner || !dismissBtn) return;
    banner.hidden = false;
    dismissBtn.addEventListener("click", () => {
      banner.hidden = true;
      try {
        localStorage.setItem(IOS_BANNER_KEY, "1");
      } catch (err) {
        // Ignore; banner will just reappear next visit in private mode.
      }
    });
  })();
</script>
