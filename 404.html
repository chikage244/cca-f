<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CCA-F 学習アプリ</title>
<meta http-equiv="refresh" content="0; url=./index.html" />
<script>
  // GitHub Pages serves this file for any unknown path (e.g. a hash route
  // requested directly). Redirect to the SPA shell, preserving the hash so
  // the router can pick up where the user left off.
  var target = "./index.html" + window.location.hash;
  window.location.replace(target);
</script>
</head>
<body>
<p>リダイレクト中... <a href="./index.html">こちらをタップ</a></p>
</body>
</html>
